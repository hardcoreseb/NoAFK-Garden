<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoAFK Garden</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="plant-icon">🌻</div>
    <div class="header-titles">
      <span class="top-label">Browser Extension</span>
      <h1>NoAFK Garden</h1>
    </div>
    <div class="header-badge">v1.0</div>
  </header>

  <!-- ── Body ── -->
  <div class="popup-body">

    <!-- Status card -->
    <div class="status-card">
      <div class="dot-wrap">
        <div class="pulse-ring"></div>
        <div class="pulse-dot"></div>
      </div>
      <div class="status-text">
        <strong>Protected</strong>
        <small>AFK detection bypassed</small>
      </div>
      <div class="status-tag">Active</div>
    </div>

    <!-- Features teaser card -->
    <div class="features-card">
      <div class="features-label">🌱 Roadmap</div>

      <div class="feature-row">
        <span class="feat-dot"></span>
        <span>AFK bypass</span>
        <span class="coming" style="background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.3);color:#4ade80;">Live</span>
      </div>

      <div class="feature-row">
        <span class="feat-dot dim"></span>
        <span>Logging</span>
        <span class="coming">Soon™</span>
      </div>

      <div class="feature-row">
        <span class="feat-dot dim"></span>
        <span>Notification handling</span>
        <span class="coming">Soon™</span>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div class="footer-dot"></div>
      <span>Only active on magicgarden.gg</span>
      <div class="footer-dot"></div>
    </footer>

  </div>
</body>
</html>
